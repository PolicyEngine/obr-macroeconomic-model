<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OBR Macro Model — Chat</title>
<style>
  :root{--ink:#0c2233;--teal:#0f9488;--paper:#f6f4ee;--line:#dcd7cb;--muted:#5d6b74}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font:16px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  header{background:linear-gradient(160deg,#0c2233,#13344c);color:#fff;
    border-bottom:3px solid var(--teal);padding:14px 20px}
  header h1{margin:0;font:600 20px Georgia,serif}
  header p{margin:4px 0 0;font-size:13px;color:#bcd}
  main{max-width:820px;margin:0 auto;padding:20px}
  #log{display:flex;flex-direction:column;gap:14px;min-height:50vh}
  .msg{max-width:88%;padding:12px 15px;border-radius:14px;white-space:pre-wrap}
  .user{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:4px}
  .bot{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
  .meta{font-size:12px;color:var(--muted);margin:2px 4px}
  form{position:sticky;bottom:0;display:flex;gap:8px;padding:14px 0;background:var(--paper)}
  textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:12px;
    padding:11px 13px;font:inherit;background:#fff}
  button{border:0;background:var(--teal);color:#fff;font:600 15px ui-sans-serif;
    padding:0 20px;border-radius:12px;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .hint{color:var(--muted);font-size:13px;margin:6px 0 16px}
  .chip{display:inline-block;border:1px solid var(--line);background:#fff;border-radius:999px;
    padding:5px 11px;margin:3px 4px 0 0;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<header>
  <h1>The OBR Macroeconomic Model — Chat</h1>
  <p>Ask about scenarios, variables, or equations. Answers are emulator output, not OBR forecasts.</p>
</header>
<main>
  <div id="log"></div>
  <div id="chips" class="hint"></div>
  <form id="f">
    <textarea id="q" rows="2" placeholder="e.g. What happens to GDP if corporation tax rises 5pp?"></textarea>
    <button id="send" type="submit">Send</button>
  </form>
</main>
<script>
const log = document.getElementById('log'), q = document.getElementById('q'),
      send = document.getElementById('send'), f = document.getElementById('f');
let history = [];

const samples = [
  "What is this model?",
  "What scenarios can I run?",
  "What happens to business investment if corporation tax rises 5pp?",
  "What does TCPRO mean?",
  "Show me the equation for consumption (CONS)",
];
const chips = document.getElementById('chips');
samples.forEach(s => { const b=document.createElement('span'); b.className='chip'; b.textContent=s;
  b.onclick=()=>{q.value=s; f.requestSubmit();}; chips.appendChild(b); });

function add(role, text){
  const d=document.createElement('div'); d.className='msg '+(role==='user'?'user':'bot');
  d.textContent=text; log.appendChild(d); d.scrollIntoView({behavior:'smooth'}); return d;
}

f.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const text=q.value.trim(); if(!text) return;
  q.value=''; add('user', text); history.push({role:'user', content:text});
  send.disabled=true;
  const thinking=add('bot','…thinking');
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({messages:history})});
    const data=await r.json().catch(()=>({}));
    if(!r.ok){
      // FastAPI: detail is a string for 413/429, a list of objects for 422
      const d=data.detail;
      throw new Error(typeof d==='string' ? d : (r.status+' '+r.statusText));
    }
    thinking.textContent=data.reply;
    history=data.messages;  // keep full tool-call history for context
  }catch(err){ thinking.textContent='Error: '+err.message; }
  finally{ send.disabled=false; q.focus(); }
});
</script>
</body>
</html>
